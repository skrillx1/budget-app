<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Budget Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="stylesheet" href="style.css?v=1.0.6" />
  </head>
  <body>
    <div id="app" class="app-container">
      <header class="ios-header-wrapper">
        <div class="ios-header">
          <span class="date-badge" id="currentDate">Budget Dashboard</span>
          <h1>Finances</h1>
        </div>
        <div class="header-actions">
          <button
            class="icon-btn"
            onclick="openSettingsModal()"
            title="Open App Settings"
          >
            Settings
          </button>
        </div>
      </header>

      <div id="output"></div>

      <div class="bottom-nav-bar">
        <button class="nav-btn-primary" onclick="openSalaryModal()">
          + Salary
        </button>
        <button class="nav-btn-primary" onclick="openExpenseModal()">
          + Expense
        </button>
        <button class="nav-btn-secondary" onclick="showActionAlert('undo')">
          Undo
        </button>
      </div>
    </div>

    <div
      id="salaryModal"
      class="modal-backdrop"
      style="display: none"
      onclick="closeSalaryModal()"
    >
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-indicator"></div>
        <div class="modal-header">
          <h3>Add Income Salary</h3>
          <button class="modal-close-btn" onclick="closeSalaryModal()">
            Cancel
          </button>
        </div>
        <div class="ios-group">
          <div class="ios-row">
            <label for="salaryInput">Amount</label>
            <input type="number" id="salaryInput" placeholder="₱0.00" />
          </div>
        </div>
        <button
          class="btn-primary"
          style="margin-top: 24px"
          onclick="addSalary()"
        >
          Add Income
        </button>
      </div>
    </div>

    <div
      id="settingsModal"
      class="modal-backdrop"
      style="display: none"
      onclick="closeSettingsModal()"
    >
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-indicator"></div>
        <div class="modal-header">
          <h3>Settings</h3>
          <button class="modal-close-btn" onclick="closeSettingsModal()">
            Done
          </button>
        </div>

        <div class="section-title">Customize Ratio Rules</div>
        <div class="ios-group">
          <div class="ios-slider-row">
            <div class="slider-meta">
              <span>Needs Allocation</span>
              <span id="needsVal">50%</span>
            </div>
            <input
              type="range"
              id="needsSlider"
              min="0"
              max="100"
              value="50"
              step="5"
              oninput="updateSliderLabels()"
            />
          </div>
          <div class="ios-slider-row">
            <div class="slider-meta">
              <span>Wants Allocation</span>
              <span id="wantsVal">30%</span>
            </div>
            <input
              type="range"
              id="wantsSlider"
              min="0"
              max="100"
              value="30"
              step="5"
              oninput="updateSliderLabels()"
            />
          </div>
          <div class="ios-slider-row">
            <div class="slider-meta">
              <span>Savings Allocation</span>
              <span id="savingsVal">20%</span>
            </div>
            <input
              type="range"
              id="savingsSlider"
              min="0"
              max="100"
              value="20"
              step="5"
              oninput="updateSliderLabels()"
            />
          </div>
        </div>

        <div id="allocationTotalIndicator" class="allocation-status-text">
          Total Rules Sum: 100% (Balanced)
        </div>
        <button
          id="saveRatiosBtn"
          class="btn-primary"
          style="margin-top: 14px; margin-bottom: 20px"
          onclick="saveCustomRatios()"
        >
          Update Rule Sets
        </button>

        <div class="section-title">System Tools</div>
        <div class="ios-group">
          <div
            class="ios-row interactive-row"
            onclick="triggerResetFromSettings()"
          >
            <label style="color: var(--ios-red); font-weight: 500"
              >Reset Budget Data Ledger</label
            >
            <span style="color: var(--ios-tertiary-label); font-size: 17px"
              >&rsaquo;</span
            >
          </div>
          <div class="ios-row" style="opacity: 0.4">
            <label style="font-size: 15px; color: var(--ios-tertiary-label)"
              >+ Future Features Add-on Slot</label
            >
          </div>
        </div>
      </div>
    </div>

    <div
      id="expenseModal"
      class="modal-backdrop"
      style="display: none"
      onclick="closeExpenseModal()"
    >
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-indicator"></div>
        <div class="modal-header">
          <h3>Add Expense</h3>
          <button class="modal-close-btn" onclick="closeExpenseModal()">
            Cancel
          </button>
        </div>
        <div class="ios-group">
          <div class="ios-row">
            <label for="expenseAmount">Amount</label>
            <input type="number" id="expenseAmount" placeholder="₱0.00" />
          </div>
          <div class="ios-row">
            <label for="expenseCategory">Category</label>
            <div class="select-wrapper">
              <select id="expenseCategory">
                <option value="needs">Needs</option>
                <option value="wants">Wants</option>
                <option value="savings">Savings</option>
              </select>
            </div>
          </div>
        </div>
        <button
          class="btn-primary"
          style="margin-top: 24px"
          onclick="addExpense()"
        >
          Save Expense
        </button>
      </div>
    </div>

    <div id="systemAlert" class="alert-backdrop" style="display: none">
      <div class="ios-alert-box">
        <h3 id="alertTitle">Title</h3>
        <p id="alertMessage">Message body goes here.</p>
        <div
          id="alertInputWrapper"
          style="display: none; width: 100%; margin-top: 12px"
        >
          <input
            type="password"
            id="alertPromptInput"
            placeholder="Enter security code"
            style="width: 100%; text-align: center; padding: 8px"
          />
        </div>
        <div class="ios-alert-buttons">
          <button class="alert-btn-cancel" onclick="closeSystemAlert()">
            Cancel
          </button>
          <button class="alert-btn-action" id="alertConfirmBtn">Confirm</button>
        </div>
      </div>
    </div>

    <script src="script.js?v=1.0.6"></script>
  </body>
</html>
